<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator - Lumixsa AI</title>
  <meta name="description" content="Generate secure, random passwords with customizable length and character options. Keep your accounts safe with strong passwords.">
  <link rel="icon" type="image/jpeg" href="https://i.ibb.co/LX7SHfCH/lumixsa-logo.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/LX7SHfCH/lumixsa-logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo">
        <img src="https://i.ibb.co/LX7SHfCH/lumixsa-logo.jpg" alt="Lumixsa AI Logo" class="logo-img">
        <span>Lumixsa AI</span>
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../tools.html" class="active">Tools</a>
        <a href="../blog.html">Blog</a>
        <a href="../about.html">About</a>
        <a href="../contact.html">Contact</a>
        <button class="theme-toggle" id="theme-toggle"><span class="theme-icon">☀️</span></button>
      </div>
      <button class="mobile-menu-btn"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="mobile-nav">
    <a href="../index.html">Home</a><a href="../tools.html">Tools</a><a href="../blog.html">Blog</a><a href="../about.html">About</a><a href="../contact.html">Contact</a>
  </div>

  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <div class="text-center scroll-reveal">
        <div class="hero-badge" style="display: inline-flex;"><span>🔐</span><span>Security Tool</span></div>
        <h1>Password Generator</h1>
        <p style="max-width: 600px; margin: 0 auto 2rem;">Create strong, secure passwords to protect your accounts.</p>
      </div>

      <div class="tool-container scroll-reveal">
        <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 1.5rem;">
          <label style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <span>Password Length: <strong id="length-display">16</strong></span>
            <input type="range" id="password-length" min="8" max="64" value="16" style="width: 200px;" oninput="updateLengthDisplay()">
          </label>
          
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="checkbox" id="include-uppercase" checked style="width: auto;">
              <span>Uppercase (A-Z)</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="checkbox" id="include-lowercase" checked style="width: auto;">
              <span>Lowercase (a-z)</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="checkbox" id="include-numbers" checked style="width: auto;">
              <span>Numbers (0-9)</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="checkbox" id="include-symbols" checked style="width: auto;">
              <span>Symbols (!@#$%)</span>
            </label>
          </div>
        </div>

        <button class="btn btn-primary" onclick="generatePassword()" style="width: 100%; margin-bottom: 1rem;">Generate Password</button>

        <div id="password-result" style="display: none;">
          <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: 0.75rem; border: 2px solid var(--accent-primary); position: relative;">
            <input type="text" id="password-output" readonly style="width: 100%; background: transparent; border: none; font-size: 1.5rem; font-family: monospace; text-align: center; color: var(--text-primary);">
            <button onclick="copyPassword()" class="btn btn-secondary" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); padding: 0.5rem 1rem; font-size: 0.875rem;">Copy</button>
          </div>
          <div id="password-strength" style="margin-top: 1rem; text-align: center;"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2025 Lumixsa AI. Managed by Dilshad Ahmad.</p>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    function updateLengthDisplay() {
      document.getElementById('length-display').textContent = document.getElementById('password-length').value;
    }

    function generatePassword() {
      const length = parseInt(document.getElementById('password-length').value);
      const uppercase = document.getElementById('include-uppercase').checked;
      const lowercase = document.getElementById('include-lowercase').checked;
      const numbers = document.getElementById('include-numbers').checked;
      const symbols = document.getElementById('include-symbols').checked;

      let chars = '';
      if (lowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (uppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (numbers) chars += '0123456789';
      if (symbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

      if (chars === '') {
        alert('Please select at least one character type!');
        return;
      }

      let password = '';
      const array = new Uint32Array(length);
      window.crypto.getRandomValues(array);
      
      for (let i = 0; i < length; i++) {
        password += chars[array[i] % chars.length];
      }

      document.getElementById('password-output').value = password;
      document.getElementById('password-result').style.display = 'block';
      
      // Calculate strength
      let strength = 'Weak';
      let color = 'var(--error)';
      if (length >= 12 && uppercase && lowercase && numbers && symbols) {
        strength = 'Very Strong';
        color = 'var(--success)';
      } else if (length >= 10 && ((uppercase && lowercase) || numbers)) {
        strength = 'Strong';
        color = '#22c55e';
      } else if (length >= 8) {
        strength = 'Medium';
        color = 'var(--warning)';
      }
      
      document.getElementById('password-strength').innerHTML = `Strength: <span style="color: ${color}; font-weight: 600;">${strength}</span>`;
    }

    function copyPassword() {
      const password = document.getElementById('password-output');
      password.select();
      document.execCommand('copy');
      
      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = originalText, 2000);
    }
  </script>
</body>
</html>
